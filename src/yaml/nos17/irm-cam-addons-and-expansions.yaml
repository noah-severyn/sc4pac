group: "nos17"
name: "industrial-revolution-mod-cam-expansions-and-addons"
version: "1.1"
subfolder: "400-industrial"
info:
  summary: "Alters the IRM Expansions & Addons to be compatible with CAM"
  description: |
    This package contains a version of T Wrecks's Industrial Revolution Mod (IRM) Expansions and Addons which are designed to work with the Colossus Addon Mod (CAM), and is specifically designed to be used alongside the `shadowstrike:industrial-revolution-mod-cam` package.

    Two versions are included: version A preserves T Wrecks' distribution of I-M lots between medium-density and high-density industrial zones, on the basis of appearance, and version B which allocates all the I-HT lots to the high-density industrial zones and all the I-M (as well as the I-D) lots to the medium-density industrial zones. This will be automatically installed depending on your chosen preferences when installing `shadowstrike:industrial-revolution-mod-cam`.
    
  author: "nos.17, rsc204, T Wrecks"
  images:
  - "https://www.simtropolis.com/objects/screens/monthly_2023_12/IRM_CAM_TitleImage.png.fb816e05139040203d7d2b23feba4d0c.png"
  website: "https://community.simtropolis.com/files/file/35792-irm-expansions-and-addons-cam-edition/"
dependencies:
- shadowstrike:industrial-revolution-mod-cam
- bsc:mega-props-jes-vol06
- bsc:mega-props-jmyers-common-props
- bsc:mega-props-gascooker-vol02
- bsc:mega-props-t1-vol03	
- bsc:mega-props-t1-vol04
- bsc:sg-models-iht
- bsc:sg-models-im1
- bsc:sg-models-im2
- bsc:mega-props-misc-vol01
#Plus these which are already required in shadowstrike:irm-cam
#- "bsc:mega-props-jes-vol02"
#- "bsc:mega-props-jes-vol03"
#- "bsc:mega-props-jes-vol05"
#- "bsc:mega-props-jes-vol08"


variants:
# IRM CAM version variant
- variant:
    irm-cam-option: "a-original"
  assets:
  - assetId: "nos17-irm-expansions-and-addons-cam-version-a"
- variant:
    irm-cam-option: "b-modified"
  assets:
  - assetId: "nos17-irm-expansions-and-addons-cam-version-b"
# Nightmode variant
- variant: { nightmode: "standard" }
  assets:
  - assetId: bsp-standard-forge-co-maxis-night
    include:
    - \\.SC4Model$
- variant: { nightmode: "dark" }
  dependencies:
  - "simfox:day-and-nite-mod"
  assets:
  - assetId: bsp-standard-forge-co-dark-night
  include:
    - \\.SC4Model$


assets:
- assetId: bsp:john-king-books
  include:
  - \\.SC4Model$
