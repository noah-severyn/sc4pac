subfolder: 630-health
info:
  summary: A large modern hospital
  description: |-
    This boxy structure was known as "Glesias Square" with tacky black grey glass, then became known as "Carmine Hilton Plaza" with blue green squared 90's looking glass... the structure finally under went a third and final makeover and is now known as the Linda Swampy Medical Centre! This package includes the LSMC as a 4x4 Hospital with a capacity of 12250 patients and a radius of 86 tiles.

    There are 3 lots that will define the structure... 1) Hospital Medical Centre! 2) High-tech Growable 3) & Last but not least... a high-tech ploppable known as Linda Swampy Pharmaceuticals!
  author: kellydale2003
  website: https://community.simtropolis.com/files/file/27565-linda-swampy-medical-centre/
  images:
    - https://www.simtropolis.com/objects/screens/monthly_05_2012/26ce523676bec1a11d4b54d08cd1e8c4-.jpg
    - https://i760.photobucket.com/albums/xx242/umbraroy/LindaSwampyMedicalCentre-1.jpg
dependencies:
