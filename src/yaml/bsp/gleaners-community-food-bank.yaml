info:
  summary: BSP Gleaners Community Food Bank
  description: |-
    For more than 32 years, Gleaners Community Food Bank has been "nourishing communities by feeding hungry people.” Last year, Gleaners distributed more than 30 million pounds of emergency food to over 430 partner soup kitchens, shelters and pantries in south east Michigan.

    There are four versions available: two I-M growable lots and two I-M ploppable lots for normal jobs and for use with the Industry Quadrupler. All lots are 7x3 and are W2W on both sides.
  author: SimHoTToDDy, Jasoncw, Nofunk
  website: https://community.simtropolis.com/files/file/23431-bsp-gleaners-community-food-bank/
