info:
  summary: BSP Production Steel Products Inc.
  description: |-
    Production Steel is a  warehouse located on Beaufait street in Detroit, but is only one of many similar buildings across the area and is typical most other American cities as well.

    There are five versions available: One landmark and two I-M growable and plopable for normal jobs and for use with the Industry Quadrupler. Is lit with Trunite. All lots are 6x2.
  author: SimHoTToDDy, Jasoncw, Nofunk
  website: https://community.simtropolis.com/files/file/22595-bsp-production-steel-products-inc/
  images:
