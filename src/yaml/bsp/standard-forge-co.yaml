  summary: BSP Standard Forge Co. (dark night)
  description: |-
    Located on the corner of Franklin and St. Aubin Street in Detroit's Rivertown district, the Standard Forge Co. building was expanded in a series of additions. It is just another average workshop that was common in the area and most other turn of the century industrial districts.

    This package includes two 5x2 IM$$ lots (one ploppable and one growable), and one 5x3 I-M growable lot.
