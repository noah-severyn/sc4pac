group: "shadowstrike"
name: "industrial-revolution-mod-cam"
version: "1.0"
subfolder: "400-industrial"
info:
  summary: "Alter the appearance of all Maxis industrial lots, for use with CAM"
  conflicts: "Should not be used with T Wreck's original IRM mod"
  author: "Shadowstrike, T Wrecks"
  website: "https://community.simtropolis.com/files/file/29669-industrial-revolution-mod-cam-version/"
  description: |
    The IRM, an absolute masterpiece of a mod created by T Wrecks, redesigns all Maxis industrial Lots, giving them a complete overhaul and spicing them up with custom textures, props, and lighting. This is a version of the IRM which will work with the Colossus Addon Mod (CAM).

    This packages includes two different versions of the mod. The 'A' version preserves T Wrecks' distribution of I-M lots between medium-density and high-density industrial zones, on the basis of appearance. The 'B' version allocates all the I-HT lots to the high-density industrial zones and all the I-M (as well as the I-D) lots to the medium-density industrial zones (I-M lots can produce pollution that tend to choke out some of the I-HT development in the high-density zones).
    
  images:
  - "https://www.simtropolis.com/objects/screens/monthly_06_2014/5123fef11d1861f3e391f925be574862-irm.jpg"
