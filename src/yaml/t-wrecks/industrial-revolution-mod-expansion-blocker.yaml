info:
  summary: IRM Expansion Blocker
  description: |-
    This blocker file ensures that blocks IRM (non-W2W) lots from growing. If you don't use IRM W2W, this file is irrelevant for you. It is only needed to make a complete switch between W2W and non-W2W for those who would like to use both.
       
    Add this to your plugins folder if you play with the IRM lots, but want to have the option of switching back to IRM W2W lots by blocking all non-W2W stuff. When you want non-W2W IRM lots to grow again, simply move this package DAT file out of your plugins again.  
  author: T Wrecks
  website: https://community.simtropolis.com/files/file/31743-irm-expansion-blocker-v10/
